  <style>
    /* ==================== Design Tokens ==================== */
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #F5F4ED;
      --color-background-tertiary: #EBE9DD;
      --color-background-info: #E7EEF7;
      --color-background-danger: #FBEAEA;
      --color-text-primary: #1A1915;
      --color-text-secondary: #4F4E48;
      --color-text-tertiary: #807E73;
      --color-text-info: #2D5A95;
      --color-text-danger: #B33A3A;
      --color-text-warning: #B47318;
      --color-border-tertiary: #E0DED1;
      --color-border-secondary: #C4C2B3;
      --color-border-info: #B0CCE9;
      --color-border-danger: #E8B4B4;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 1px 2px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 2px 4px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.08);
      --shadow-xl: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    /* ==================== Base ==================== */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .app-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      position: relative;
    }
    h2, h3, h4 { margin: 0; }
    h3 { font-size: 16px; }
    h4 { font-size: 14px; }

    button {
      font-family: inherit;
      font-size: 14px;
      padding: 8px 12px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      color: var(--color-text-primary);
    }
    button:hover { background: var(--color-background-secondary); }

    input, select, textarea {
      font-family: inherit;
      font-size: 14px;
      padding: 8px 12px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      color: var(--color-text-primary);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--color-border-info);
    }
    input.error, input.error:focus { border-color: var(--color-text-danger); }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ==================== App Styles ==================== */
    .nav-tab {
      padding: 0px 12px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      background: var(--color-background-primary);
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 6px;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: background 0.1s, color 0.1s, transform 0.1s, box-shadow 0.1s;
    }
    .nav-tab:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }
    .nav-tab:hover {
      background: var(--color-background-secondary);
    }
    .nav-tab.active {
      background: var(--color-text-secondary);
      color: var(--color-background-primary);
      border-color: var(--color-text-secondary);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
    }
    .today-btn { padding: 6px 14px; height: 32px; background: var(--color-background-primary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-sm); display: flex; align-items: center; flex-shrink: 0; }
    .today-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
    .add-fab {
      height: 32px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #7F77DD;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 2px 4px rgba(127, 119, 221, 0.35)
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .add-fab i { font-size: 14px; }
    .add-fab:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(127, 119, 221, 0.5);
      background: #5D54C2;
    }
    .add-fab:active {
      transform: translateY(0);
      box-shadow: 0 1px 2px rgba(127, 119, 221, 0.4);
    }
    
    /* Period Navigator (월/주 뷰 상단) */
    /* Period Navigator (월/주 뷰 상단) */
    /* Period Navigator (월/주 뷰 상단) */
    .period-nav { display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 1rem; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .period-nav-btn { padding: 6px 14px; background: transparent; border: none; color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; font-size: 14px; border-radius: 0; box-shadow: none; }
    @media (hover: hover) {
  .period-nav-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
}
    .period-nav-label-wrap { display: inline-flex; align-items: center; gap: 6px; flex: 1; justify-content: center; }
    .period-nav-label { font-size: 14px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; }
    .period-nav-dot { width: 6px; height: 6px; background: #7F77DD; border-radius: 50%; flex-shrink: 0; }

    .wd { text-align: center; font-size: 11px; color: var(--color-text-tertiary); padding: 4px 0; font-weight: 500; }
    .wd.sun { color: #D93B3B; } .wd.sat { color: #378ADD; }
    .month-cell { min-height: 70px; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; padding: 4px 5px; background: var(--color-background-primary); cursor: pointer; display: flex; flex-direction: column; gap: 2px; overflow: hidden; box-shadow: var(--shadow-sm);}
    .month-cell.other-month { opacity: 0.35; }
    .month-cell.today { background: var(--color-background-info); border-color: var(--color-border-info); }
    .month-cell.selected { outline: 1.5px solid var(--color-border-info); }
    .month-cell-date { font-size: 11px; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
    .month-cell.today .month-cell-date { color: var(--color-text-info); font-weight: 600; }
    .month-cell-date.sun { color: #D93B3B; } .month-cell-date.sat { color: #378ADD; }
    .month-event { font-size: 10px; padding: 1px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .month-todo { font-size: 10px; padding: 1px 4px; border-radius: 3px; display: flex; align-items: center; gap: 3px; cursor: pointer; overflow: hidden; flex-wrap: nowrap; white-space: nowrap; line-height: 1.3; }
    .month-todo.done { opacity: 0.5; text-decoration: line-through; }
    .month-todo i.ti { font-size: 10px; line-height: 1; flex-shrink: 0; }
    .month-todo span { font-size: 10px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; min-width: 0; white-space: nowrap; }
    .month-event-more { font-size: 10px; color: var(--color-text-tertiary); padding: 0 4px; }

    /* Week (Kanban) */
    .week-board { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
    .week-view-btn { padding: 6px 8px; font-size: 14px; background: var(--color-background-primary); color: var(--color-text-tertiary); border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; cursor: pointer; display: flex; align-items: center; box-shadow: var(--shadow-sm); }
    .week-view-btn:hover { background: var(--color-background-secondary); color: var(--color-text-secondary); }
    .week-view-btn.active { background: var(--color-text-secondary); color: var(--color-background-primary); border-color: var(--color-text-secondary); }
    .week-view-btn i { font-size: 16px; }

    /* 세로 보기 모드 */
    .week-board.list-mode { flex-direction: column; overflow-x: visible; }
    .week-board.list-mode .day-block { width: 100%; max-width: none; min-height: auto; }
    .week-board::-webkit-scrollbar { height: 6px; }
    .week-board::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 3px; }
    .day-block { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px 16px; background: var(--color-background-primary); cursor: pointer; width: calc(100% - 40px); max-width: 680px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; min-height: 50vh; box-shadow: var(--shadow-sm); overflow: hidden; }
    .day-block.today { border-color: var(--color-border-tertiary); background: var(--color-background-primary); }
    .week-board.list-mode .day-block.today { border-color: var(--color-border-tertiary); background: var(--color-background-primary); }
    /* 리스트 모드: 헤더를 카드 바깥으로 빼서 레이블 느낌 */
    .week-board.list-mode .day-block { padding: 12px 14px; gap: 8px; min-height: auto; }
    .day-header-wrap { display: flex; align-items: center; gap: 8px; }
    .day-header-wrap .day-today-dot { margin: 0 0 8px 0; align-self: center; }
    .day-header { display: inline-flex; align-items: center; align-self: flex-start; margin: 0 0 8px; padding: 4px 12px; background: #EFEDFA; border: none; border-radius: 999px; }
    .day-name { font-size: 12px; font-weight: 600; color: #5D54C2; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
    .day-name-suffix { font-size: 11px; color: #5D54C2; opacity: 0.7; font-weight: 500; margin-left: 2px; }
    .week-board.list-mode .day-name { font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: #5D54C2; }
    .week-board.list-mode { gap: 16px; }
    .day-today-dot { width: 6px; height: 6px; background: #7F77DD; border-radius: 50%; margin-left: 6px; align-self: center; flex-shrink: 0; }
    .event-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; flex-wrap: nowrap; white-space: nowrap; min-width: 0; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); }
    .event-item:hover { background: var(--color-background-secondary); }
    .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .event-time { font-variant-numeric: tabular-nums; color: var(--color-text-secondary); font-size: 12px; min-width: 72px; flex-shrink: 0; }
    .event-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .event-place { font-size: 11px; color: var(--color-text-tertiary); }
    .day-empty { font-size: 12px; color: var(--color-text-tertiary); padding: 2px 0; }
    .day-content { background: #FAFAF6; border-radius: var(--border-radius-md); padding: 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .week-todo { display: flex; align-items: center; gap: 6px; padding: 4px 6px; font-size: 12px; border-radius: 4px; cursor: pointer; }
    .week-todo.done { opacity: 0.5; text-decoration: line-through; }
    .week-todo i.ti { font-size: 12px; flex-shrink: 0; }
    .week-todo span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }

    .detail-event { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; cursor: pointer; background: var(--color-background-primary); box-shadow: var(--shadow-sm);}
    .detail-event:hover { background: var(--color-background-secondary); }

    .todo-input-row { display: flex; gap: 6px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .todo-input-row > input[type="text"] { flex: 1; min-width: 80px; }
    .todo-input-row > select { width: 90px; flex-shrink: 0; appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237F77DD' d='M0 0l5 6 5-6z'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 28px; cursor: pointer; }
    .todo-due-btn { position: relative; display: flex; align-items: center; gap: 4px; padding: 8px 10px; font-size: 13px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-tertiary); box-shadow: var(--shadow-sm); flex-shrink: 0; }
    .todo-due-btn:hover { background: var(--color-background-secondary); }
    /* 마감일 버튼 커스텀 툴팁 (데스크탑 호버) */
    .todo-due-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-text-primary);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
    }
    .todo-due-btn:hover::after { opacity: 1; }

    /* 클릭 시 짧게 보이는 안내 (모바일/데스크탑 둘 다) */
    .todo-due-btn.show-hint::after { opacity: 1; }
    .todo-due-btn.has-date { color: var(--color-text-info); background: var(--color-background-info); border-color: var(--color-border-info); }
    .todo-due-btn.has-date::after { content: none; }
    .todo-due-btn i { font-size: 16px; }
    .todo-due-btn input[type="date"] { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; -webkit-appearance: none; }
    .todo-add-btn { padding: 8px 12px; background: #7F77DD; color: white; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 16px; box-shadow: 0 2px 4px rgba(127, 119, 221, 0.35); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .todo-add-btn:hover { background: #6D65D0; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; box-shadow: var(--shadow-sm);}
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--color-text-tertiary); }
    .todo-item.overdue { border-color: var(--color-border-danger); background: var(--color-background-danger); }
    .todo-check { width: 18px; height: 18px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; background: transparent; padding: 0; }
    .todo-item.done .todo-check { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
    .todo-main { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .todo-text { font-size: 14px; word-break: break-word; }
    .todo-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--color-text-tertiary); }
    .todo-due { display: inline-flex; align-items: center; gap: 3px; font-variant-numeric: tabular-nums; }
    .todo-due.overdue { color: #D93B3B; font-weight: 600; }
    .todo-due.urgent { color: #D93B3B; font-weight: 600; }
    .todo-due.soon { color: var(--color-text-warning); font-weight: 500; }
    .todo-cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .todo-delete { border: none; background: transparent; color: var(--color-text-tertiary); cursor: pointer; padding: 4px; font-size: 16px; opacity: 0.5; }
    .todo-item:hover .todo-delete { opacity: 1; }
    .filter-btn.active { background: #EFEDFA; border-color: #D9D4F0; color: #5D54C2; font-weight: 500; }
    /* Category Color Picker */
    .cat-color-btn { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; box-shadow: var(--shadow-sm); flex-shrink: 0; color: var(--color-text-tertiary); }
    .cat-color-btn:hover { background: var(--color-background-secondary); }
    .cat-color-swatch { width: 16px; height: 16px; border-radius: 50%; border: 0.5px solid var(--color-border-tertiary); }
    .cat-color-popup { position: absolute; top: calc(100% + 4px); right: 60px; z-index: 100; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-xl); padding: 10px; display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
    .cat-color-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .cat-color-option { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; }
    .cat-color-option:hover { transform: scale(1.1); }
    .cat-color-option.selected { border-color: var(--color-text-primary); }
    .cat-color-custom-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 8px; font-size: 13px; background: var(--color-background-secondary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; }
    .cat-color-custom-btn:hover { background: var(--color-background-tertiary); }
    .cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-sm); transition: background 0.1s; }
    @media (hover: hover) {
  .cat-row:hover { background: var(--color-background-secondary); }
}
    .cat-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid var(--color-border-tertiary); }
    .cat-name { flex: 1; font-size: 13px; color: var(--color-text-primary); }
    .cat-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
    @media (hover: hover) {
  .cat-row:hover .cat-actions { opacity: 1; }
}
@media (hover: none) {
  .cat-actions { opacity: 1; }
}
    .cat-action-btn { border: none; background: transparent; color: var(--color-text-tertiary); cursor: pointer; padding: 6px; border-radius: 4px; display: flex; align-items: center; }
    .cat-action-btn:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }

    /* Time Picker */
    .tp-wrap { position: relative; }
    .tp-trigger { width: 100%; padding: 8px 12px; font-size: 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; text-align: left; font-variant-numeric: tabular-nums; color: var(--color-text-primary); display: flex; align-items: center; justify-content: space-between; }
    .tp-trigger.placeholder { color: var(--color-text-tertiary); }
    .tp-popup { position: absolute; top: calc(100% + 4px); left: 0; z-index: 200; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); box-shadow: var(--shadow-xl); padding: 8px; display: none; flex-direction: column; gap: 8px; }
    #ev-end-wrap .tp-popup { left: auto; right: 0; }
    .tp-popup.open { display: flex; }
    .tp-direct { display: flex; gap: 4px; align-items: center; padding-bottom: 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .tp-period-btn { padding: 4px 8px; font-size: 12px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); border-radius: 4px; cursor: pointer; color: var(--color-text-primary); }
    .tp-period-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
    .tp-num-input { width: 44px; padding: 4px 6px; font-size: 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; text-align: center; font-variant-numeric: tabular-nums; background: var(--color-background-primary); color: var(--color-text-primary); -moz-appearance: textfield; }

<script>
// ==================== Storage Layer (localStorage) ====================
const storage = {
  get: (key) => {
    try { const v = localStorage.getItem(key); return v ? { value: v } : null; }
    catch(e) { return null; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, value); return true; }
    catch(e) { console.error('Storage save failed:', e); return false; }
  }
};

(function() {
  const STORE_EVENTS = 'planner:events';
  const STORE_TODOS = 'planner:todos';
  const STORE_CATS = 'planner:categories';
  const STORE_GACCOUNTS = 'planner:googleAccounts';
  const GOOGLE_CLIENT_ID = '1082530236706-mcoldupdtni86aeip1migbr5lrmoi2if.apps.googleusercontent.com';
  const GOOGLE_SCOPE = 'https://www.googleapis.com/auth/calendar.readonly';

  const DEFAULT_CATS = [
    { id: 'c1', name: '개인', color: '#7F77DD' },
    { id: 'c2', name: '부부', color: '#D4537E' },
    { id: 'c3', name: '생일', color: '#EF9F27' },
    { id: 'c4', name: '학원', color: '#1D9E75' },
    { id: 'c5', name: '회사', color: '#378ADD' }
  ];

  let events = [], todos = [], categories = [];
  let weekOffset = 0, monthOffset = 0, editingEventId = null, editingTodoId = null, todoFilter = 'all';
  let selectedMonthDate = null;

  // 커스텀 확인 모달 - 브라우저 기본 confirm() 대신 사용
  function customConfirm(message) {
    return new Promise((resolve) => {
      document.getElementById('confirm-message').textContent = message;
      document.getElementById('confirm-modal-overlay').style.display = 'flex';

      const ok = document.getElementById('confirm-ok');
      const cancel = document.getElementById('confirm-cancel');
      const overlay = document.getElementById('confirm-modal-overlay');

      const cleanup = () => {
        overlay.style.display = 'none';
        ok.onclick = null;
        cancel.onclick = null;
        overlay.onclick = null;
      };

      ok.onclick = () => { cleanup(); resolve(true); };
      cancel.onclick = () => { cleanup(); resolve(false); };
      overlay.onclick = (e) => { if (e.target === overlay) { cleanup(); resolve(false); } };
    });
  }

  // 카테고리 삭제 전용 모달 - 이동/삭제 선택 가능
  function openCategoryDeleteModal(cat) {
    const overlay = document.getElementById('cat-delete-modal-overlay');
    const nameEl = document.getElementById('cat-delete-name');
    const countEl = document.getElementById('cat-delete-count');
    const optionsEl = document.getElementById('cat-delete-options');
    const targetSelect = document.getElementById('cat-delete-target');

    const eventCount = events.filter(e => e.categoryId === cat.id).length;
    const todoCount = todos.filter(t => t.categoryId === cat.id).length;
    const total = eventCount + todoCount;

    nameEl.textContent = cat.name;

    if (total > 0) {
      countEl.textContent = `이 카테고리에 일정 ${eventCount}개, 할 일 ${todoCount}개가 있어요.`;
      optionsEl.style.display = 'flex';

      targetSelect.innerHTML = '';
      categories.filter(c => c.id !== cat.id).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        targetSelect.appendChild(opt);
      });
      document.querySelector('input[name="cat-delete-action"][value="move"]').checked = true;
    } else {
      countEl.textContent = '이 카테고리에는 항목이 없어요.';
      optionsEl.style.display = 'none';
    }

    overlay.style.display = 'flex';

    const okBtn = document.getElementById('cat-delete-ok');
    const cancelBtn = document.getElementById('cat-delete-cancel');

    const cleanup = () => {
      overlay.style.display = 'none';
      okBtn.onclick = null;
      cancelBtn.onclick = null;
      overlay.onclick = null;
    };

    cancelBtn.onclick = cleanup;
    overlay.onclick = (e) => { if (e.target === overlay) cleanup(); };

    okBtn.onclick = () => {
      if (total > 0) {
        const action = document.querySelector('input[name="cat-delete-action"]:checked').value;
        if (action === 'move') {
          const targetId = targetSelect.value;
          events.forEach(e => { if (e.categoryId === cat.id) e.categoryId = targetId; });
          todos.forEach(t => { if (t.categoryId === cat.id) t.categoryId = targetId; });
        } else {
          events = events.filter(e => e.categoryId !== cat.id);
          todos = todos.filter(t => t.categoryId !== cat.id);
        }
      }
      categories = categories.filter(c => c.id !== cat.id);
      save(STORE_CATS, categories);
      save(STORE_EVENTS, events);
      save(STORE_TODOS, todos);
      cleanup();
      renderCategories();
      renderMonth();
      renderWeek();
    };
  }

  function loadAll() {
    try { const r = storage.get(STORE_EVENTS); events = r ? JSON.parse(r.value) : []; } catch(e) { events = []; }
    try { const r = storage.get(STORE_TODOS); todos = r ? JSON.parse(r.value) : []; } catch(e) { todos = []; }
    try { const r = storage.get(STORE_CATS); categories = r ? JSON.parse(r.value) : DEFAULT_CATS; } catch(e) { categories = DEFAULT_CATS; }
  }
  function save(key, val) { storage.set(key, JSON.stringify(val)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function getCat(id) { return categories.find(c => c.id === id) || categories[0]; }
  function acctPrefix(email) { return /@devsisters\.com$/i.test(email) ? '[회사] ' : ''; }
  function hexToRgba(hex, alpha) {
    const h = hex.replace('#', '');
    return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${alpha})`;
  }
  // 색의 밝기에 따라 적절한 텍스트 색 반환
  function textColorForBg(hex) {
    const h = hex.replace('#', '');
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    // 인지 밝기 (perceived brightness) 공식
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    // 밝으면 다크그레이, 어두우면 더 진한 버전 사용
    if (brightness > 180) {
      // 같은 색조의 훨씬 진한 버전 만들기 (각 채널 50% 어둡게)
      const dr = Math.floor(r * 0.45);
      const dg = Math.floor(g * 0.45);
      const db = Math.floor(b * 0.45);
      return `rgb(${dr},${dg},${db})`;
    }
    return hex;
  }
  function startOfWeek(date) {
    const d = new Date(date); d.setHours(0,0,0,0);
    const day = d.getDay(); d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
    return d;
  }
  function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

  function fmtTimeKR(t) {
    if (!t) return '';
    const [hStr, mStr] = t.split(':');
    const h = parseInt(hStr, 10);
    const m = parseInt(mStr, 10);
    const period = h < 12 ? '오전' : '오후';
    let h12 = h % 12; if (h12 === 0) h12 = 12;
    return `${period} ${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  function dueInfo(dueStr) {
    if (!dueStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dueStr + 'T00:00:00');
    const diffDays = Math.round((due - today) / 86400000);
    let label, status;
    if (diffDays < 0) { label = `${Math.abs(diffDays)}일 지남`; status = 'overdue'; }
    else if (diffDays === 0) { label = '오늘까지'; status = 'urgent'; }
    else if (diffDays === 1) { label = '내일까지'; status = 'urgent'; }
    else if (diffDays <= 3) { label = `${diffDays}일 남음`; status = 'soon'; }
    else { label = `${due.getMonth()+1}/${due.getDate()}까지`; status = 'normal'; }
    return { label, status, diffDays };
  }

  // ===== TIME PICKER =====
  function createTimePicker(wrapEl, placeholder = '시간 선택') {

      e.stopPropagation();
      let v = parseInt(hourInput.value, 10);
      if (isNaN(v)) return;
      if (v < 1) v = 1; if (v > 12) v = 12;
      hour12 = v; refreshOptions();
    };
    hourInput.onclick = (e) => e.stopPropagation();

    const sep = document.createElement('span');
    sep.className = 'tp-direct-sep'; sep.textContent = ':';

    const minuteInput = document.createElement('input');

    minuteInput.oninput = (e) => {
      e.stopPropagation();
      let v = parseInt(minuteInput.value, 10);
      if (isNaN(v)) return;
      if (v < 0) v = 0; if (v > 59) v = 59;
      minute = v; refreshOptions();
    };

    directRow.appendChild(periodBtnGroup);
    directRow.appendChild(hourInput);
    directRow.appendChild(sep);
    directRow.appendChild(minuteInput);

    const colsRow = document.createElement('div');

    const hourCol = document.createElement('div');

      const opt = document.createElement('div');
      opt.className = 'tp-opt'; opt.textContent = String(h).padStart(2, '0'); opt.dataset.hour = h;
      opt.onclick = (e) => { e.stopPropagation(); hour12 = h; syncDirectInputs(); refreshOptions(); };
      hourCol.appendChild(opt);
    }

    const minCol = document.createElement('div');
    minCol.className = 'tp-col';
    for (let m = 0; m < 60; m += 5) {
      const opt = document.createElement('div');
      opt.className = 'tp-opt'; opt.textContent = String(m).padStart(2, '0'); opt.dataset.minute = m;
      opt.onclick = (e) => { e.stopPropagation(); minute = m; syncDirectInputs(); refreshOptions(); };
      minCol.appendChild(opt);
    }

    const actionCol = document.createElement('div');
    actionCol.className = 'tp-actions';
    const confirmBtn = document.createElement('button');
    confirmBtn.type = 'button';
    confirmBtn.innerHTML = '<i class="ti ti-check" style="font-size:14px;"></i>';
    confirmBtn.title = '확인';
    confirmBtn.style.cssText = 'background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info);';
    confirmBtn.onclick = (e) => {
      e.stopPropagation();
      let h24 = hour12 % 12; if (period === '오후') h24 += 12;
      value = `${String(h24).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
      updateTrigger(); closePopup();
    };
    const clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.innerHTML = '<i class="ti ti-trash" style="font-size:14px;"></i>';

    clearBtn.onclick = (e) => { e.stopPropagation(); value = ''; updateTrigger(); closePopup(); };
    actionCol.appendChild(confirmBtn); actionCol.appendChild(clearBtn);

    colsRow.appendChild(hourCol); colsRow.appendChild(minCol); colsRow.appendChild(actionCol);
    popup.appendChild(directRow); popup.appendChild(colsRow);

    function syncDirectInputs() { hourInput.value = hour12; minuteInput.value = minute; }

    function refreshOptions() {
      amBtn.classList.toggle('active', period === '오전');
      pmBtn.classList.toggle('active', period === '오후');
      hourCol.querySelectorAll('.tp-opt').forEach(o => o.classList.toggle('selected', parseInt(o.dataset.hour) === hour12));
      minCol.querySelectorAll('.tp-opt').forEach(o => o.classList.toggle('selected', parseInt(o.dataset.minute) === minute));
      [hourCol, minCol].forEach(col => {
        const sel = col.querySelector('.tp-opt.selected');
        if (sel) sel.scrollIntoView({ block: 'nearest' });
      });
    }

    function updateTrigger() {
      const labelEl = trigger.querySelector('.tp-label');
      if (value) { labelEl.textContent = fmtTimeKR(value); trigger.classList.remove('placeholder'); }
      else { labelEl.textContent = placeholder; trigger.classList.add('placeholder'); }
    }

    function openPopup() {
      document.querySelectorAll('.tp-popup.open').forEach(p => { if (p !== popup) p.classList.remove('open'); });
      if (value) {
        const [hStr, mStr] = value.split(':');
        const h = parseInt(hStr, 10); const m = parseInt(mStr, 10);
        period = h < 12 ? '오전' : '오후';
        let h12 = h % 12; if (h12 === 0) h12 = 12;
        hour12 = h12; minute = m;
      }
      syncDirectInputs(); refreshOptions();
      popup.classList.add('open');
    }
    function closePopup() { popup.classList.remove('open'); }

    trigger.onclick = (e) => { e.stopPropagation(); if (popup.classList.contains('open')) closePopup(); else openPopup(); };
    document.addEventListener('click', (e) => { if (!wrapEl.contains(e.target)) closePopup(); });

    return { getValue: () => value, setValue: (v) => { value = v || ''; updateTrigger(); } };

  function renderMonth() {
    const today = new Date(); today.setHours(0,0,0,0);
    const baseMonth = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
    const year = baseMonth.getFullYear();
    const month = baseMonth.getMonth();
    document.getElementById('month-label').textContent = `${year}년 ${month + 1}월`;
    document.getElementById('month-dot').style.display = monthOffset === 0 ? 'inline-block' : 'none';

    const firstDay = new Date(year, month, 1);
    const gridStart = startOfWeek(firstDay);
    const grid = document.getElementById('month-grid');
    grid.innerHTML = '';

    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(d.getDate() + i);
      const dateStr = fmtDate(d);
      const isCurMonth = d.getMonth() === month;
      const dayOfWeek = d.getDay();
      const dayEvents = events.concat(gEvents).filter(e => e.date === dateStr).sort((a,b) => (a.start||'').localeCompare(b.start||''));
      const dayTodos = todos.filter(t => t.due === dateStr);

      const cell = document.createElement('div');
      cell.className = 'month-cell' + (isCurMonth ? '' : ' other-month') + (isSameDay(d, today) ? ' today' : '') + (selectedMonthDate === dateStr ? ' selected' : '');

      const dateEl = document.createElement('div');
      dateEl.className = 'month-cell-date' + (dayOfWeek === 0 ? ' sun' : dayOfWeek === 6 ? ' sat' : '');
      dateEl.textContent = d.getDate();
      cell.appendChild(dateEl);

      const maxShow = 3;
      const items = [];
      dayEvents.forEach(ev => items.push({ type: 'event', data: ev }));
      dayTodos.forEach(t => items.push({ type: 'todo', data: t }));

      items.slice(0, maxShow).forEach(item => {
        if (item.type === 'event') {
          const ev = item.data;
          const cat = getCat(ev.categoryId);
          const chip = document.createElement('div');
          chip.className = 'month-event';
          chip.style.background = hexToRgba(cat.color, 0.18);
          chip.style.color = textColorForBg(cat.color);
          chip.textContent = ev.title;
          cell.appendChild(chip);
        } else {
          const t = item.data;
          const cat = getCat(t.categoryId);
          const chip = document.createElement('div');
          chip.className = 'month-todo' + (t.done ? ' done' : '');
          chip.style.background = '#FFE4D1';
          chip.style.color = '#A8541A';
          chip.innerHTML = `<i class="ti ti-checkbox" style="font-size:10px;"></i><span style="overflow:hidden; text-overflow:ellipsis; min-width:0; white-space:nowrap; font-size:10px;">${t.text}</span>`;
          chip.onclick = (e) => {
            e.stopPropagation();

      if (items.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'month-event-more';
        more.textContent = `+${items.length - maxShow}`;

      cell.ondblclick = () => openEventModal(null, dateStr);
      grid.appendChild(cell);
    }

    if (selectedMonthDate) {
      const d = new Date(selectedMonthDate + 'T00:00:00');
      const dayEvents = events.filter(e => e.date === selectedMonthDate).sort((a,b) => (a.start||'').localeCompare(b.start||''));

  // 주간 보기 모드 토글

  function renderTodos() {
    populateCatSelect(document.getElementById('new-todo-cat'), categories[0].id);
    const list = document.getElementById('todo-list');
    list.innerHTML = '';

    let filtered = todos.filter(t => {
      if (todoFilter === 'active') return !t.done;
      if (todoFilter === 'done') return t.done;
      if (todoFilter === 'overdue') {
        if (t.done || !t.due) return false;
        return dueInfo(t.due).status === 'overdue';
      }
      return true;
    });

    filtered.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      if (a.due && b.due) return a.due.localeCompare(b.due);
      if (a.due) return -1;
      if (b.due) return 1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });

    filtered.forEach(t => {

      const info = dueInfo(t.due);

  const GCAL_PALETTE = ['#7F77DD','#D4537E','#EF9F27','#1D9E75','#378ADD','#C2557A','#5BA89B','#B47318','#8E63C7','#3FA34D','#D9694E','#5D7FBF'];
  function nextCatColor() {
    const used = categories.map(c => c.color.toUpperCase());
    const free = GCAL_PALETTE.find(c => !used.includes(c.toUpperCase()));
    return free || GCAL_PALETTE[categories.length % GCAL_PALETTE.length];

  // 구글 캘린더 id -> 플래너 카테고리 id 매핑 보장 (없으면 태그 생성)
  function ensureCatForCalendar(email, cal) {
    const tagName = acctPrefix(email) + cal.summary;
    let cat = categories.find(c => c.gcalKey === email + '::' + cal.id);
    if (!cat) {
      cat = categories.find(c => c.name === tagName && !c.gcalKey);

    }
    if (!cat) {
      cat = { id: uid(), name: tagName, color: nextCatColor(), gcalKey: email + '::' + cal.id };
      categories.push(cat);
    }
    return cat.id;
  }
  const gTokens = {};            // email -> {token, expiresAt} (메모리만, 새로고침 시 사라짐)
  let gTokenClient = null, gSettle = null;
  try { const r = storage.get(STORE_GACCOUNTS); gAccounts = r ? JSON.parse(r.value) : []; } catch(e) { gAccounts = []; }

  function ensureTokenClient() {
    if (gTokenClient) return true;
    if (!(window.google && google.accounts && google.accounts.oauth2)) return false;
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GOOGLE_SCOPE,
      callback: (resp) => { if (gSettle) { const s = gSettle; gSettle = null; resp && resp.error ? s.reject(new Error(resp.error)) : s.resolve(resp.access_token); } },
      error_callback: (err) => { if (gSettle) { const s = gSettle; gSettle = null; s.reject(new Error((err && err.type) || 'oauth_error')); } }
    });
    return true;
  }
  function requestToken({ prompt = 'consent', hint } = {}) {
    return new Promise((resolve, reject) => {
      if (!ensureTokenClient()) return reject(new Error('Google 라이브러리 로딩 중이에요. 잠시 후 다시 시도하세요.'));
      gSettle = { resolve, reject };
      const cfg = { prompt };
      if (hint) cfg.hint = hint;
      gTokenClient.requestAccessToken(cfg);
    });
  }
  async function fetchPrimaryEmail(token) {
    const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('calendarList ' + res.status);
    const data = await res.json();
    const primary = (data.items || []).find(c => c.primary);
    return primary ? primary.id : null;
  }
  // 다음 단계(6단계)에서 일정 가져올 때 토큰 재발급용
  async function getToken(email) {
    const t = gTokens[email];
    if (t && t.expiresAt > Date.now() + 60000) return t.token;
    const token = await requestToken({ prompt: '', hint: email });
    gTokens[email] = { token, expiresAt: Date.now() + 55 * 60 * 1000 };
    return token;
  }
  async function connectAccount() {
    try {
      const token = await requestToken({ prompt: 'consent' });
      const email = await fetchPrimaryEmail(token);
      if (!email) throw new Error('계정 이메일을 확인하지 못했어요.');
      gTokens[email] = { token, expiresAt: Date.now() + 55 * 60 * 1000 };
      if (!gAccounts.find(a => a.email === email)) {
        gAccounts.push({ email, label: '', calendars: [] });
        save(STORE_GACCOUNTS, gAccounts);
      }
      renderSync();
    } catch (e) { alert('연결 실패: ' + e.message); }
  }
  function disconnectAccount(email) {
    gAccounts = gAccounts.filter(a => a.email !== email);
    delete gTokens[email];
    save(STORE_GACCOUNTS, gAccounts);
    renderSync();
  }
  async function fetchCalendarList(token) {
    const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('calendarList ' + res.status);
    const data = await res.json();
    return (data.items || []).map(c => ({ id: c.id, summary: c.summaryOverride || c.summary, bgColor: c.backgroundColor || '#7F77DD' }));
  }
  async function loadCalendars(email, btn) {
    const acct = gAccounts.find(a => a.email === email);
    if (!acct) return;
    const orig = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.innerHTML = '불러오는 중...'; }
    try {
      const token = await getToken(email);
      const list = await fetchCalendarList(token);
      const prev = {};
      (acct.calendars || []).forEach(c => { prev[c.id] = c.selected; });
      acct.calendars = list.map(c => ({ ...c, selected: prev[c.id] || false }));
      save(STORE_GACCOUNTS, gAccounts);
      renderSync();
    } catch (e) {
      alert('캘린더 불러오기 실패: ' + e.message);
      if (btn) { btn.disabled = false; btn.innerHTML = orig; }
    }
  }
  async function fetchEventsForCalendar(token, calId) {
    const timeMin = new Date(); timeMin.setMonth(timeMin.getMonth() - 1); timeMin.setHours(0,0,0,0);
    const timeMax = new Date(); timeMax.setMonth(timeMax.getMonth() + 3); timeMax.setHours(23,59,59,0);
    const params = new URLSearchParams({
      timeMin: timeMin.toISOString(), timeMax: timeMax.toISOString(),
      singleEvents: 'true', orderBy: 'startTime', maxResults: '2500'
    });
    const url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(calId) + '/events?' + params;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) throw new Error('events ' + res.status);
    const data = await res.json();
    return data.items || [];
  }
  function mapGEvent(item, email, calId, catId) {
    const isAllDay = !!(item.start && item.start.date);
    let date, start = '', end = '';
    if (isAllDay) {
      date = item.start.date;
    } else {
      const s = new Date(item.start.dateTime);
      const e = item.end && item.end.dateTime ? new Date(item.end.dateTime) : null;
      date = fmtDate(s);
      start = String(s.getHours()).padStart(2,'0') + ':' + String(s.getMinutes()).padStart(2,'0');
      if (e) end = String(e.getHours()).padStart(2,'0') + ':' + String(e.getMinutes()).padStart(2,'0');
    }
    return {
      id: 'g_' + email + '_' + item.id,
      gcal: true,
      title: item.summary || '(제목 없음)',
      categoryId: catId,
      date, start, end,
      place: item.location || '',
      memo: item.description || ''
    };
  }
  async function syncAllGoogle(btn) {
    const orig = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> 가져오는 중...'; }
    try {
      const collected = [];
      for (const a of gAccounts) {
        const selected = (a.calendars || []).filter(c => c.selected);
        if (selected.length === 0) continue;
        const token = await getToken(a.email);
        for (const cal of selected) {
          const catId = ensureCatForCalendar(a.email, cal);
          const items = await fetchEventsForCalendar(token, cal.id);
          items.forEach(it => collected.push(mapGEvent(it, a.email, cal.id, catId)));
        }
      }
      gEvents = collected;
      save(STORE_CATS, categories);
      save('planner:gcalEvents', gEvents);
      save('planner:gcalSyncedAt', String(Date.now()));
      renderSync(); renderMonth(); renderWeek();
      alert('동기화 완료: 일정 ' + gEvents.length + '개');
    } catch (e) {
      alert('동기화 실패: ' + e.message);
    } finally {
      if (btn) { btn.disabled = false; btn.innerHTML = orig; }
    }
  }
  function toggleCalendar(email, calId, checked) {
    const acct = gAccounts.find(a => a.email === email);
    if (!acct) return;
    const c = (acct.calendars || []).find(x => x.id === calId);
    if (c) { c.selected = checked; save(STORE_GACCOUNTS, gAccounts); }
  }
  function renderSync() {
    const wrap = document.getElementById('sync-accounts');
    if (!wrap) return;
    wrap.innerHTML = '';
    if (gAccounts.length === 0) {
      const p = document.createElement('p');
      p.style.cssText = 'color: var(--color-text-tertiary); font-size: 14px; padding: 1rem 0;';
      p.textContent = '연결된 구글 계정이 없어요.';
      wrap.appendChild(p);
      return;
    }
    gAccounts.forEach(a => {
      const connected = !!gTokens[a.email];
      const card = document.createElement('div');
      card.style.cssText = 'border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); box-shadow: var(--shadow-sm); overflow: hidden;';

      const header = document.createElement('div');
      header.style.cssText = 'display:flex; align-items:center; gap:12px; padding:10px 12px;';
      header.innerHTML = `<i class="ti ti-user-circle" style="font-size:20px; color: var(--color-text-tertiary);"></i>
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${a.email}</div>
          <div style="font-size:11px; color:${connected ? 'var(--color-text-info)' : 'var(--color-text-tertiary)'};">${connected ? '연결됨' : '토큰 만료 (불러오기 시 재로그인)'}</div>
        </div>`;
      const del = document.createElement('button');
      del.className = 'cat-action-btn';
      del.innerHTML = '<i class="ti ti-trash"></i>';
      del.title = '연결 해제';
      del.onclick = () => disconnectAccount(a.email);
      header.appendChild(del);
      card.appendChild(header);

      const body = document.createElement('div');
      body.style.cssText = 'padding: 0 12px 12px;';
      const hasList = a.calendars && a.calendars.length > 0;

      const loadBtn = document.createElement('button');
      loadBtn.style.cssText = 'font-size:13px; padding:6px 12px; display:flex; align-items:center; gap:4px;';
      loadBtn.innerHTML = `<i class="ti ti-refresh" style="font-size:14px;"></i> ${hasList ? '캘린더 새로고침' : '캘린더 불러오기'}`;
      loadBtn.onclick = () => loadCalendars(a.email, loadBtn);
      body.appendChild(loadBtn);

      if (hasList) {
        const listWrap = document.createElement('div');
        listWrap.style.cssText = 'display:flex; flex-direction:column; gap:4px; margin-top:10px;';
        a.calendars.forEach(c => {
          const label = document.createElement('label');
          label.style.cssText = 'display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:13px;';
          const cb = document.createElement('input');
          cb.type = 'checkbox'; cb.checked = !!c.selected;
          cb.style.cssText = 'margin:0; flex-shrink:0;';
          cb.onchange = () => toggleCalendar(a.email, c.id, cb.checked);
          const swatch = document.createElement('span');
          swatch.style.cssText = `width:12px; height:12px; border-radius:50%; flex-shrink:0; background:${c.bgColor};`;
          const name = document.createElement('span');
          name.textContent = c.summary;
          name.style.cssText = 'overflow:hidden; text-overflow:ellipsis; white-space:nowrap;';
          label.appendChild(cb); label.appendChild(swatch); label.appendChild(name);
          listWrap.appendChild(label);
        });
        body.appendChild(listWrap);
      }

      card.appendChild(body);
      wrap.appendChild(card);
    });
  }
  { const b = document.getElementById('connect-google-btn'); if (b) b.onclick = connectAccount; }
  { const b = document.getElementById('sync-now-btn'); if (b) b.onclick = () => syncAllGoogle(b); }

  loadAll();
  renderMonth();
  updateTodayBtn();
})();

// ==================== PWA Service Worker Registration ====================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('Service worker registered:', reg.scope))
      .catch(err => console.log('Service worker registration failed:', err));
  });
}
</script>
